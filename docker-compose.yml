services:
  postgres:
    image: postgres:16-alpine
    container_name: colacode-postgres
    environment:
      POSTGRES_USER: colacode_user
      POSTGRES_PASSWORD: colacode_password
      POSTGRES_DB: colacode_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the initialization script to run on first startup
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colacode_user -d colacode_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: colacode-redis
    ports:
      - "6379:6379"
    # Running purely in-memory for fast pub/sub. Persistence is disabled.
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: